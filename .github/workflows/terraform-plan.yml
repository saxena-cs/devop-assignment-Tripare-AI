name: Terraform Plan

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform-plan.yml"

jobs:
  terraform:
    name: Terraform Plan
    runs-on: ubuntu-latest

    strategy:
      matrix:
        environment:
          - dev
          - prod

    defaults:
      run:
        working-directory: infra/envs/${{ matrix.environment }}

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform fmt -check -recursive ../../

      - name: Terraform init
        run: terraform init

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: |
          terraform plan -refresh=false -no-color -out=tfplan.binary | tee tfplan.txt

      - name: Upload Terraform plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ matrix.environment }}
          path: infra/envs/${{ matrix.environment }}/tfplan.txt

      - name: Comment Terraform plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const env = "${{ matrix.environment }}";
            const plan = fs.readFileSync(`infra/envs/${env}/tfplan.txt`, "utf8");

            const maxLength = 60000;
            const body = `## Terraform Plan - ${env}

            \`\`\`
            ${plan.substring(0, maxLength)}
            \`\`\`

            ${plan.length > maxLength ? "Plan output was truncated. Please check workflow artifact for full plan." : ""}
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
